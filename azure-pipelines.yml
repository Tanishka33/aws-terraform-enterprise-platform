trigger:
  - main

pr:
  - main

pool:
  name: Default

variables:
  tfFolder: environments/dev
  artifactName: tfplan

stages:

# VALIDATE
- stage: Validate
  displayName: Validate
  jobs:
  - job: ValidateJob
    steps:
    - checkout: self

    - script: |
        terraform version
      displayName: Terraform Version

    - script: |
        terraform fmt -check -recursive
      displayName: Terraform Format

    - script: |
        cd $(tfFolder)
        terraform init -backend=false
        terraform validate
      displayName: Terraform Validate

# PLAN
- stage: Plan
  displayName: Plan
  dependsOn: Validate
  jobs:
  - job: PlanJob
    steps:
    - checkout: self

    - script: |
        cd $(tfFolder)
        terraform init -input=false
        terraform plan -input=false -out=$(Build.ArtifactStagingDirectory)/tfplan
      displayName: Terraform Plan
      env:
        TF_INPUT: false

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/tfplan'
        ArtifactName: '$(artifactName)'
      displayName: Publish Terraform Plan

# APPLY
- stage: Apply
  displayName: Apply
  dependsOn: Plan
  jobs:
  - deployment: ApplyDeployment
    environment: dev
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: DownloadBuildArtifacts@1
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: '$(artifactName)'
              downloadPath: '$(Pipeline.Workspace)'

          - script: |
              cd $(tfFolder)
              terraform init -input=false
              terraform apply -auto-approve $(Pipeline.Workspace)/$(artifactName)/tfplan
            displayName: Apply Approved Plan
            env:
              TF_INPUT: false
trigger:
- main

pool:
  name: Default

stages:

- stage: Validate

  jobs:

  - job: ValidateTerraform

    steps:

    - checkout: self

    - script: |
        terraform version
      displayName: "Terraform Version"

    - script: |
        cd environments/dev
        terraform fmt -check -recursive ../..
      displayName: "Terraform Format"

    - script: |
        cd environments/dev

        terraform init -backend=false

        terraform validate
      displayName: "Terraform Validate"

    - script: |
        mkdir output
        echo "Validation Successful" > output/result.txt
      displayName: "Create Artifact"

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: output
        ArtifactName: validation-output

- stage: Deploy

  dependsOn: Validate

  jobs:

  - job: DeployJob

    steps:

    - task: DownloadBuildArtifacts@1
      inputs:
        buildType: current
        downloadType: single
        artifactName: validation-output
        downloadPath: $(System.DefaultWORKINGDIRECTORY)

    - script: |
        cat validation-output/result.txt
      displayName: "Consume Artifact"
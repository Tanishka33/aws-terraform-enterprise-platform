trigger:
  - main

pr:
  - main

pool:
  name: Default

variables:
  tfFolder: environments/dev
  artifactName: tfplan

stages:

# STAGE 1 — VALIDATE

- stage: Validate
  displayName: "Terraform Validation"
  jobs:
  - job: ValidateJob
    steps:
    - checkout: self

    - script: |
        terraform version
      displayName: "Terraform Version"

    - script: |
        terraform fmt -check -recursive
      displayName: "Terraform Format"

    - script: |
        cd $(tfFolder)
        terraform init -backend=false
        terraform validate
      displayName: "Terraform Validate"

# STAGE 2 — PLAN

- stage: Plan
  displayName: "Terraform Plan"
  dependsOn: Validate
  jobs:
  - job: PlanJob
    steps:
    - checkout: self

    - script: |
        cd $(tfFolder)
        terraform init
        terraform plan -out=$(Build.ArtifactStagingDirectory)/tfplan
      displayName: "Terraform Plan"

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/tfplan'
        ArtifactName: '$(artifactName)'
      displayName: "Publish Terraform Plan"

# STAGE 3 — APPLY

- stage: Apply
  displayName: "Terraform Apply"
  dependsOn: Plan
  jobs:
  - deployment: ApplyDeployment
    environment: dev
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: DownloadBuildArtifacts@1
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: '$(artifactName)'
              downloadPath: '$(Pipeline.Workspace)'
            displayName: "Download Approved Plan"

          - script: |
              cd $(tfFolder)
              terraform init
              terraform apply -auto-approve $(Pipeline.Workspace)/$(artifactName)/tfplan
            displayName: "Apply Approved Plan"
trigger:
  - main

pr:
  - main

pool:
  name: Default

variables:
  tfFolder: environments/dev
  artifactName: tfplan
  tfBucket: tanushka-terraform-state-prod
  tfKey: dev/terraform.tfstate
  tfLockTable: terraform-state-lock
  tfRegion: ap-south-1

stages:

# =====================================
# VALIDATE
# =====================================
- stage: Validate
  displayName: Validate
  jobs:
  - job: ValidateJob
    steps:
    - checkout: self

    - script: |
        terraform version
      displayName: Terraform Version

    - script: |
        terraform fmt -check -recursive
      displayName: Terraform Format

    - script: |
        cd $(tfFolder)
        rm -rf .terraform
        terraform init -backend=false
        terraform validate
      displayName: Terraform Validate

# =====================================
# PLAN
# =====================================
- stage: Plan
  displayName: Plan
  dependsOn: Validate
  jobs:
  - job: PlanJob
    steps:
    - checkout: self

    - script: |
        cd $(tfFolder)
        rm -rf .terraform
        terraform init -reconfigure -input=false -backend-config="bucket=$(tfBucket)" -backend-config="key=$(tfKey)" -backend-config="region=$(tfRegion)" -backend-config="dynamodb_table=$(tfLockTable)"
        terraform plan -input=false -out=tfplan
      displayName: Terraform Plan

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.SourcesDirectory)/$(tfFolder)/tfplan'
        ArtifactName: '$(artifactName)'
      displayName: Publish Plan

# =====================================
# APPLY
# =====================================
- stage: Apply
  displayName: Apply
  dependsOn: Plan
  jobs:
  - deployment: ApplyDeployment
    environment: dev
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: DownloadBuildArtifacts@1
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: '$(artifactName)'
              downloadPath: '$(Pipeline.Workspace)'
            displayName: Download Approved Plan

          - script: |
              cd $(tfFolder)
              rm -rf .terraform
              terraform init -reconfigure -input=false -backend-config="bucket=$(tfBucket)" -backend-config="key=$(tfKey)" -backend-config="region=$(tfRegion)" -backend-config="dynamodb_table=$(tfLockTable)"
              terraform apply -auto-approve $(Pipeline.Workspace)/$(artifactName)/tfplan
            displayName: Terraform Apply